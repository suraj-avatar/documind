# railway.toml — Explicit build configuration for Railway
# Forces Railway to use the Dockerfile (Python/FastAPI backend)
# instead of auto-detecting the project as a Node.js/Vite app.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
